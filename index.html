<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Таймер до важного события</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-blur bg-blur--one"></div>
    <div class="bg-blur bg-blur--two"></div>

    <main class="container">
      <header class="hero">
        <div class="lang-switcher">
          <label for="language-select" id="language-label">Язык</label>
          <select id="language-select" name="language-select" aria-label="Выбор языка">
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="uk">Українська</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="pl">Polski</option>
            <option value="tr">Türkçe</option>
            <option value="ar">العربية</option>
            <option value="he">עברית</option>
            <option value="zh">中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <h1>Таймер до важного события</h1>
        <p class="hero-subtitle" id="hero-subtitle">Выберите событие и узнайте, сколько осталось времени.</p>
      </header>

      <section class="card controls-card">
        <h2 id="controls-title">Выбор события</h2>
        <form id="event-form" class="event-form">
          <div class="field">
            <label for="event-name" id="event-name-label">Название события</label>
            <input
              id="event-name"
              name="event-name"
              type="text"
              placeholder="Например: Моя олимпиада"
              required
              maxlength="70"
            />
          </div>

          <div class="field">
            <label for="event-date" id="event-date-label">Дата события</label>
            <input id="event-date" name="event-date" type="date" required />
          </div>

          <div class="field">
            <label for="event-time" id="event-time-label">Время события</label>
            <input id="event-time" name="event-time" type="time" required value="00:00" />
          </div>

          <div class="field">
            <label for="notify-mode" id="notify-mode-label">Уведомление при завершении</label>
            <select id="notify-mode" name="notify-mode">
              <option value="sound_notification">Сообщение + звук</option>
              <option value="sound_only">Только звук</option>
              <option value="notification_only">Только сообщение</option>
              <option value="no_notification">Без сообщения и звука</option>
            </select>
          </div>

          <button type="submit" class="btn-primary" id="submit-button">Запустить таймер</button>
        </form>
      </section>

      <section class="card countdown-card">
        <div class="event-summary">
          <p><span id="event-title-label">Событие:</span> <strong id="event-title">-</strong></p>
          <p><span id="event-date-text-label">Дата:</span> <strong id="event-date-text">-</strong></p>
        </div>

        <p id="status-message" class="status-message" aria-live="polite"></p>

        <div class="timer-grid" aria-live="polite">
          <div class="time-box">
            <span id="years">0</span>
            <small id="years-label">Года</small>
          </div>
          <div class="time-box">
            <span id="months">0</span>
            <small id="months-label">Месяцев</small>
          </div>
          <div class="time-box">
            <span id="weeks">0</span>
            <small id="weeks-label">Недель</small>
          </div>
          <div class="time-box">
            <span id="days">0</span>
            <small id="days-label">Дней</small>
          </div>
          <div class="time-box">
            <span id="hours">0</span>
            <small id="hours-label">Часов</small>
          </div>
          <div class="time-box">
            <span id="minutes">0</span>
            <small id="minutes-label">Минут</small>
          </div>
          <div class="time-box">
            <span id="seconds">0</span>
            <small id="seconds-label">Секунд</small>
          </div>
        </div>
      </section>

      <section class="card fact-card">
        <h2 id="fact-title">Факт дня</h2>
        <p id="fact-day">Загружаем интересный факт...</p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
<!-- Кнопка переключения темы -->
<button id="themeToggle">🌙 Тёмная тема</button>

<script>
const button = document.getElementById("themeToggle");

// Проверяем сохранённую тему
if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light-theme");
    button.innerHTML = "☀️ Светлая тема";
}

button.addEventListener("click", () => {
    document.body.classList.toggle("light-theme");

    // Если светлая тема включена
    if (document.body.classList.contains("light-theme")) {
        button.innerHTML = "☀️ Светлая тема";
        localStorage.setItem("theme", "light");
    } else {
        // Если тёмная тема
        button.innerHTML = "🌙 Тёмная тема";
        localStorage.setItem("theme", "dark");
    }
});
</script>

<style>
/* Тёмная тема по умолчанию */
body {
    background: #0b0f2f;
    color: white;
    transition: 0.4s;
}

/* Светлая тема */
body.light-theme {
    background: #f5f5f5;
    color: #111;
}

/* Кнопка */
#themeToggle {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    margin: 20px;
    background: linear-gradient(90deg,#52d3aa,#7aa7ff);
    color: black;
    font-weight: bold;
</style>
<script src="./script.js"></script>

<!-- ===== КНОПКА ТЕМЫ ===== -->
<div class="theme-switch">
    <button id="themeToggle">🌙</button>
</div>

<style>

/* ===== КНОПКА ===== */
.theme-switch{
    position:fixed;
    top:20px;
    right:25px;
    z-index:9999;
}

#themeToggle{
    width:52px;
    height:52px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:22px;
    background:linear-gradient(135deg,#52d3aa,#7aa7ff);
    color:black;
    font-weight:bold;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
    transition:0.3s;
}

/* ===== ТЁМНАЯ ТЕМА ===== */
body{
    background:#0b0f2f;
    color:white;
    transition:0.4s;
}

body *{
    color:white;
}

/* INPUT */
input,
select,
textarea{
    background:#3a3d57;
    color:white;
    border:1px solid rgba(255,255,255,0.15);
}

/* ===== СВЕТЛАЯ ТЕМА ===== */
body.light-theme{
    background:#f5f5f5;
}

body.light-theme *{
    color:black !important;
}

body.light-theme input,
body.light-theme select,
body.light-theme textarea{
    background:white;
    color:black !important;
    border:1px solid #ccc;
}

body.light-theme input::placeholder{
    color:#666;
}

</style>

<script>

const button = document.getElementById("themeToggle");

// Загрузка темы
if(localStorage.getItem("theme") === "light"){
    document.body.classList.add("light-theme");
    button.innerHTML = "☀️";
}else{
    button.innerHTML = "🌙";
}

// Переключение
button.addEventListener("click", () => {

    document.body.classList.toggle("light-theme");

    if(document.body.classList.contains("light-theme")){
        button.innerHTML = "☀️";
        localStorage.setItem("theme","light");
    }else{
        button.innerHTML = "🌙";
        localStorage.setItem("theme","dark");
    }

});

</script>

</body>
</html>
